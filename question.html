<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ガチャ診断</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{

background:linear-gradient(
180deg,
#FFF9EA,
#FFECC8
);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

.container{

width:92%;
max-width:430px;

background:white;

padding:30px;

border-radius:25px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

text-align:center;

}

.step{

color:#ff5d83;
font-weight:bold;
margin-bottom:20px;

}

.question{

font-size:28px;

font-weight:bold;

margin-bottom:35px;

line-height:1.5;

}

.answer{

display:block;

width:100%;

padding:15px;

margin:10px 0;

border:none;

border-radius:20px;

background:#f5f5f5;

font-size:18px;

cursor:pointer;

transition:.2s;

}

.answer:hover{

background:#ff5d83;

color:white;

transform:scale(1.03);

}

.progress{

height:12px;

background:#eee;

border-radius:30px;

overflow:hidden;

margin-bottom:25px;

}

.bar{

width:33%;

height:100%;

background:#ff5d83;

transition:.3s;

}

</style>

</head>

<body>

<div class="container">

<div class="progress">

<div class="bar" id="bar"></div>

</div>

<div class="step" id="step">

Question 1 / 5

</div>

<div class="question" id="question">

休日は何して遊ぶ？

</div>

<div id="answers"></div>

</div>

<script>

const questions=[

{
q:"休日の過ごし方は？",
a:[
"外へ出かける",
"家でゆっくり過ごす",
"ショッピングに行く",
"趣味を楽しむ"
]
},

{
q:"好きな季節は？",
a:[
"春",
"夏",
"秋",
"冬"
]
},

{
q:"好きな色は？",
a:[
"赤",
"青",
"黄",
"緑"
]
},

{
q:"旅行へ行くならどこ？",
a:[
"海",
"山",
"テーマパーク",
"温泉"
]
},

{
q:"おやつならどれを選ぶ？",
a:[
"チョコレート",
"アイスクリーム",
"ポテトチップス",
"ケーキ"
]
}

];

let current=0;

let result=[];

showQuestion();

function showQuestion(){

document.getElementById("step").innerHTML=
`Question ${current+1} / ${questions.length}`;

document.getElementById("question").innerHTML=
questions[current].q;

document.getElementById("bar").style.width=
((current+1)/questions.length*100)+"%";

let html="";

questions[current].a.forEach((item,index)=>{

html+=`
<button class="answer"
onclick="next('${index}')">

${item}

</button>
`;

});

document.getElementById("answers").innerHTML=html;

}

function next(value){

result.push(value);

current++;

if(current>=questions.length){

localStorage.setItem("result",JSON.stringify(result));

location.href="result.html";

return;

}

showQuestion();

}

</script>

</body>

</html>
