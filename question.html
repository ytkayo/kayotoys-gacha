<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">

<title>ガチャ診断</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"M PLUS Rounded 1c","Yu Gothic",sans-serif;
}

body{

    background:
        linear-gradient(
            rgba(255,249,234,.78),
            rgba(255,236,200,.82)
        ),
        url("https://www.rakuten.ne.jp/gold/kayotoys/event/gacha/index_03.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    height:100svh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

}

.step{

color:#ff5d83;
font-weight:bold;
margin-bottom:20px;

}

.question{

font-size:30px;

font-weight:800;

color:#ff4d6d;

line-height:1.5;

margin-bottom:30px;

text-shadow:
0 2px 0 #fff,
0 4px 8px rgba(0,0,0,.1);

}

.answer{

display:block;

width:100%;

padding:15px;

margin:12px 0;

border:3px solid #ffd84d;

border-radius:999px;

background:linear-gradient(
180deg,
#ffffff 0%,
#fff3d8 100%
);

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.2s;

box-shadow:
0 4px 10px rgba(0,0,0,.12);

}

.answer:hover{

background:linear-gradient(
180deg,
#ff7a2f,
#ff3b30
);

color:#fff;

transform:scale(1.03);

box-shadow:
0 6px 16px rgba(0,0,0,.2);

}

.progress{

height:12px;

background:#eee;

border-radius:30px;

overflow:hidden;

margin-bottom:25px;

}

.bar{

width:33%;

height:100%;

background:#ff5d83;

transition:.3s;

}

</style>

</head>

<body>

<div class="container">

<div class="progress">

<div class="bar" id="bar"></div>

</div>

<div class="step" id="step">

Question 1 / 5

</div>

<div class="question" id="question">

休日は何して遊ぶ？

</div>

<div id="answers"></div>

</div>

<script>

const questions=[

{
q:"休日の過ごし方は？",
a:[
"カフェ巡り",
"家でゲームをする",
"ショッピングに行く",
"テレビ・映画を観る"
]
},

{
q:"好きな季節は？",
a:[
"春",
"夏",
"秋",
"冬"
]
},

{
q:"好きな色は？",
a:[
"赤",
"青",
"黄",
"緑"
]
},

{
q:"行くならどこ？",
a:[
"海",
"山",
"テーマパーク",
"温泉"
]
},

{
q:"おやつならどれを選ぶ？",
a:[
"チョコレート",
"アイスクリーム",
"ポテトチップス",
"ケーキ"
]
}

];

let current=0;

let result=[];

showQuestion();

function showQuestion(){

document.getElementById("step").innerHTML=
`Question ${current+1} / ${questions.length}`;

document.getElementById("question").innerHTML=
questions[current].q;

document.getElementById("bar").style.width=
((current+1)/questions.length*100)+"%";

let html="";

questions[current].a.forEach((item,index)=>{

html+=`
<button class="answer"
onclick="next('${index}')">

${item}

</button>
`;

});

document.getElementById("answers").innerHTML=html;

}

function next(value){

result.push(value);

current++;

if(current>=questions.length){

localStorage.setItem("result",JSON.stringify(result));

location.href="result.html";

return;

}

showQuestion();

}

</script>

</body>

</html>
