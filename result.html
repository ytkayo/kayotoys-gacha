<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Result</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"M PLUS Rounded 1c","Yu Gothic",sans-serif;
}
body{

    background:
        linear-gradient(
            rgba(255,249,234,.78),
            rgba(255,236,200,.82)
        ),
        url("https://www.rakuten.ne.jp/gold/kayotoys/event/gacha/index_03.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    height:100svh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

}
.container{
    position:relative;
    width:min(92vw,420px);
    height:95svh;
}
.scene{
position:absolute;
inset:0;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
#loading{font-size:30px;font-weight:bold;color:#ff4d6d;animation:blink .6s infinite}
#capsule{display:none}
.ball{
width:120px;height:120px;position:relative;
animation:roll .8s ease-in-out infinite;
}
.top,.bottom{
position:absolute;left:0;width:120px;height:60px;border:4px solid #555;
}
.top{top:0;background:#ff4d4d;border-radius:120px 120px 0 0}
.bottom{bottom:0;background:#fff;border-radius:0 0 120px 120px}
.ball.open .top{animation:topOpen .5s forwards}
.ball.open .bottom{animation:bottomOpen .5s forwards}
#result h1{font-size:38px;color:#ff4d6d;margin-bottom:8px}
#item{
display:block;
width:min(52vw,220px);
opacity:0;
transform:scale(.2);
}
#item.show{animation:itemShow .5s forwards}
#text{margin-top:6px;font-size:20px;font-weight:bold;line-height:1.35}
.start{
margin-top:14px;
padding:14px 30px;
font-size:20px;
font-weight:900;
color:#fff;
background:linear-gradient(180deg,#ff7a2f,#ff3b30);
border:4px solid #ffd84d;
border-radius:999px;
text-decoration:none;
box-shadow:0 6px 0 #d7281d;
display:inline-block;
}
.confetti{

    position:fixed;

    top:-40px;

    pointer-events:none;

    animation:fall 3.5s linear forwards;

    z-index:999;

}
@keyframes blink{50%{opacity:.2}}
@keyframes roll{

0%{
    transform:translateX(-8px) rotate(-6deg);
}

50%{
    transform:translateX(8px) rotate(6deg);
}

100%{
    transform:translateX(-8px) rotate(-6deg);
}

}
@keyframes topOpen{to{transform:translateY(-45px) rotate(-25deg);opacity:.2}}
@keyframes bottomOpen{to{transform:translateY(45px) rotate(25deg);opacity:.2}}
@keyframes itemShow{
0%{opacity:0;transform:scale(.2)}
70%{transform:scale(1.15)}
100%{opacity:1;transform:scale(1)}
}
@keyframes fall{

0%{

opacity:1;

transform:
translateY(-50px)
translateX(0)
rotate(0deg);

}

25%{

transform:
translateY(25vh)
translateX(-20px)
rotate(90deg);

}

50%{

transform:
translateY(50vh)
translateX(20px)
rotate(180deg);

}

75%{

transform:
translateY(75vh)
translateX(-15px)
rotate(270deg);

}

100%{

opacity:0;

transform:
translateY(110vh)
translateX(25px)
rotate(360deg);

}

}
.loadingTitle{

font-size:38px;

font-weight:800;

color:#ff4d6d;

text-shadow:
0 3px 0 #fff,
0 6px 12px rgba(0,0,0,.18);

animation:pulse .8s infinite;

}

.loadingSub{

margin-top:12px;

font-size:20px;

color:#666;

}

.loadingDots{

margin-top:30px;

font-size:36px;

letter-spacing:12px;

animation:dots .8s infinite;

}

@keyframes dots{

50%{

opacity:.2;

}

}
</style>
</head>
<body>
<div class="container">
<div id="loading" class="scene">

<div class="loadingTitle">

🎰 ガチャ抽選中！

</div>

<div class="loadingSub">

景品を選んでいます…

</div>

<div class="loadingDots">

● ● ●

</div>

</div>

<div id="capsule" class="scene">
<div class="ball" id="ball">
<div class="top"></div>
<div class="bottom"></div>
</div>
</div>

<div id="result" class="scene">
<h1>🎉 おめでとう！</h1>
<img id="item" alt="">
<p id="text"></p>
<a class="start" href="index.html">もう一回遊ぶ！</a>
</div>
</div>

<script>
const prizes={
"default":{
title:"ぴよこちゃん",
image:"https://image.rakuten.co.jp/kayotoys/cabinet/item/squeeze/4580791113203_001.jpg"
},
"11111":{
title:"レトロチャームカメラ",
image:"https://image.rakuten.co.jp/kayotoys/cabinet/shop/logo1200.jpg"
}
};

const answers=JSON.parse(localStorage.getItem("result"))||[];
const prize=prizes[answers.join("")]||prizes.default;

const loading=document.getElementById("loading");
const capsule=document.getElementById("capsule");
const result=document.getElementById("result");
const ball=document.getElementById("ball");
const item=document.getElementById("item");
const text=document.getElementById("text");

loading.style.display="flex";

setTimeout(()=>{
 loading.style.display="none";
 capsule.style.display="flex";
},1200);

setTimeout(()=>{
 ball.classList.add("open");
},2500);

setTimeout(()=>{
 capsule.style.display="none";
 result.style.display="flex";
 item.src=prize.image;
 item.classList.add("show");
 text.innerHTML=
"あなたへの景品は<br><span style='font-size:1.5em;color:#ff4d6d;'>"
+prize.title+
"</span><br>スタッフへこの画面をご提示ください";
 confetti();
},3200);

function confetti(){

    const icons=["🎉","✨","⭐","🎊","💛","🩷"];

    for(let i=0;i<40;i++){

        const c=document.createElement("div");

        c.className="confetti";

        c.textContent=icons[Math.floor(Math.random()*icons.length)];

        c.style.left=Math.random()*100+"vw";

        c.style.animationDelay=(Math.random()*0.8)+"s";

        c.style.fontSize=(18+Math.random()*18)+"px";

        c.style.transform=`rotate(${Math.random()*360}deg)`;

        document.body.appendChild(c);

    }

}
</script>
</body>
</html>
