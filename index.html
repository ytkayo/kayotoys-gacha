<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">

<title>ガチャ診断</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"M PLUS Rounded 1c","Yu Gothic",sans-serif;
}

body{

    background:
        linear-gradient(
            rgba(255,249,234,.78),
            rgba(255,236,200,.82)
        ),
        url("https://www.rakuten.ne.jp/gold/kayotoys/event/gacha/index_03.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    height:100svh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

}

.container{

    width:min(92vw,420px);

    height:92svh;

    display:flex;

    flex-direction:column;

    justify-content:space-evenly;

    align-items:center;

    text-align:center;

}

h1{

font-family:"M PLUS Rounded 1c",sans-serif;

font-weight:800;

letter-spacing:.05em;

font-size:clamp(32px,8vw,46px);

margin:0;

line-height:1.2;

color:#ff4d6d;

text-shadow:
0 4px 0 #fff,
0 8px 12px rgba(0,0,0,.15);

}

.sub{

font-size:clamp(16px,4.8vw,22px);

font-weight:bold;

line-height:1.5;

margin:0;

}

.gacha{

width:min(58vw,250px);

margin:0;

}

.gacha img{

width:100%;

}

.start{

display:inline-block;

padding:14px 32px;

font-size:clamp(18px,5vw,22px);

font-weight:900;

color:#fff;

background:linear-gradient(
180deg,
#ff7a2f 0%,
#ff3b30 100%
);

border:4px solid #ffd84d;

border-radius:999px;

cursor:pointer;

text-shadow:0 2px 0 rgba(0,0,0,.25);

box-shadow:
0 6px 0 #d7281d,
0 10px 18px rgba(0,0,0,.22);

transition:.15s;

animation:pulse 1.2s infinite;

}

border:5px solid #ffd84d;

border-radius:999px;

cursor:pointer;

text-shadow:
0 2px 0 rgba(0,0,0,.25);

box-shadow:
0 8px 0 #d7281d,
0 12px 24px rgba(0,0,0,.25);

transition:.15s;

animation:pulse 1s infinite;

}

.start:active{

transform:translateY(4px);

box-shadow:
0 2px 0 #d7281d;

}

.start:hover{

transform:scale(1.05);

}

.footer{

font-size:11px;

color:#888;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}

}

@keyframes bounce{

0%,100%{
    transform:translateY(0);
}

50%{
    transform:translateY(-8px);
}

}

@keyframes float{

0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}

}

</style>

</head>

<body>

<div class="container">

<h1>🎉 ガチャ診断 🎉</h1>

<div class="sub">

あなたにピッタリの景品を<br>

GETしよう！

</div>

<div class="gacha">

<img src="https://www.rakuten.ne.jp/gold/kayotoys/event/gacha/index_01.png" alt="ガチャ画像" width="100%">

</div>

<button
class="start"
onclick="location.href='question.html'">

ガチャを始める！

</button>

<div class="footer">

© 2026 All rights Reserved.

</div>

</div>

</body>

</html>
